body{

  overflow:hidden;

/* PARTICLE BG */
canvas{

/* CONTAINER */
.container{

@keyframes fadeIn{

/* HEADER */

  justify-content:space-between;

.title{

  -webkit-text-fill-color:transparent;
}

.back{
  padding:8px 14px;
  background:rgba(255,255,255,0.05);
  border:1px solid var(--stroke);
  border-radius:10px;
  color:var(--text);
  text-decoration:none;
  transition:0.3s;
}

.back:hover{
  transform:translateY(-3px);
  background:rgba(56,189,248,0.12);
}

/* CARD */
.card{
  position:relative;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--stroke);
  border-radius:22px;
  padding:25px;
  backdrop-filter: blur(16px);
  box-shadow:0 20px 40px rgba(0,0,0,0.35);
  overflow:hidden;
  animation:float 5s ease-in-out infinite;
}

/* glow layer */
.card::before{
  content:"";
  position:absolute;
  inset:-2px;
  background:linear-gradient(120deg,var(--accent),var(--accent2),#22d3ee);
  opacity:0.12;
  filter:blur(30px);
}

/* float anim */
@keyframes float{
  0%,100%{transform:translateY(0px)}
  50%{transform:translateY(-6px)}
}

/* PROFILE HEADER */
.profile-header{
  display:flex;
  gap:18px;
  align-items:center;
  margin-bottom:18px;
  position:relative;
  z-index:2;

.badge{

  padding:5px 12px;

/* LINE */

/* TEXT */
.section-title{

.info{

.row{

<button id="musicBtn" style="
position:fixed;
bottom:90px;
right:20px;
z-index:9999;
padding:10px 14px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.2);
background:rgba(56,189,248,0.2);
color:white;
backdrop-filter:blur(10px);
cursor:pointer;
">
🎵 Music
</button>

<audio id="bgm" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>
<script>
/* PARTICLE (SAMA KAYAK DASHBOARD) */
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');

canvas.width = innerWidth;
canvas.height = innerHeight;

let p = [];

for(let i=0;i<60;i++){
  p.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2
  });
}

function anim(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="rgba(56,189,248,0.5)";

  p.forEach(e=>{
    ctx.beginPath();
    ctx.arc(e.x,e.y,e.r,0,Math.PI*2);
    ctx.fill();

    e.y += 0.3;
    if(e.y > canvas.height) e.y = 0;
  });

  requestAnimationFrame(anim);
}

anim();
</script>
<script>
const audio = document.getElementById("bgm");
const btn = document.getElementById("musicBtn");

// channel biar semua halaman sinkron
const bc = new BroadcastChannel("adudu_music");

// ambil state terakhir
let isPlaying = localStorage.getItem("music") === "1";
let time = parseFloat(localStorage.getItem("music_time") || "0");

audio.currentTime = time;

function updateUI(){
  btn.innerText = isPlaying ? "⏸ Music" : "🎵 Music";
}

function playMusic(){
  audio.play();
  isPlaying = true;
  localStorage.setItem("music", "1");
  bc.postMessage({type:"play"});
  updateUI();
}

function pauseMusic(){
  audio.pause();
  isPlaying = false;
  localStorage.setItem("music", "0");
  bc.postMessage({type:"pause"});
  updateUI();
}

btn.onclick = () => {
  if(isPlaying) pauseMusic();
  else playMusic();
};

// simpan waktu biar ga reset
setInterval(() => {
  localStorage.setItem("music_time", audio.currentTime);
}, 1000);

// sync antar tab/file
bc.onmessage = (e) => {
  if(e.data.type === "play"){
    audio.play();
    isPlaying = true;
  }
  if(e.data.type === "pause"){
    audio.pause();
    isPlaying = false;
  }
  updateUI();
};

// auto restore state
window.onload = () => {
  updateUI();
  if(isPlaying){
    audio.play();
  }
};
</script>
